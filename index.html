<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Middle East — Foreign Military Bases & Conflicts</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 100%; height: 100%; overflow: hidden; background: #262626; }
    body { width: 100%; height: 100%; min-width: 100vw; min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; background: #262626; }
    #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100vh; min-width: 100%; min-height: 100%; background: #262626; }
    .leaflet-container { background: #262626 !important; }

    /* Title bar */
    .title-bar {
      position: absolute; top: 20px; left: 20px; z-index: 1000;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.9));
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px; padding: 16px 22px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .title-bar h1 {
      font-size: 17px; font-weight: 800; color: #f1f5f9;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .title-bar .subtitle {
      display: flex; align-items: center; gap: 8px;
      margin-top: 6px; font-size: 11px; color: #64748b; font-weight: 500;
    }
    .title-bar .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #22c55e;
      box-shadow: 0 0 6px #22c55e; animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px #22c55e; }
      50% { opacity: 0.5; box-shadow: 0 0 12px #22c55e; }
    }

    /* Layer toggles */
    .layer-toggles {
      position: absolute; top: 20px; right: 20px; z-index: 1000;
      display: flex; flex-direction: column; gap: 6px;
    }
    .layer-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border: none; border-radius: 12px;
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.25s ease;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .layer-btn .btn-icon { font-size: 14px; line-height: 1; }
    .layer-btn .btn-count {
      margin-left: auto; font-size: 10px; font-weight: 700;
      background: rgba(255,255,255,0.15); padding: 2px 7px;
      border-radius: 20px; min-width: 22px; text-align: center;
    }
    .layer-btn.military {
      background: rgba(59, 130, 246, 0.15); color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .layer-btn.military.active {
      background: rgba(59, 130, 246, 0.4); color: #fff;
      border-color: rgba(59, 130, 246, 0.6);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.25);
    }
    .layer-btn.conflict {
      background: rgba(239, 68, 68, 0.15); color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .layer-btn.conflict.active {
      background: rgba(239, 68, 68, 0.4); color: #fff;
      border-color: rgba(239, 68, 68, 0.6);
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.25);
    }
    .layer-btn:hover { transform: translateY(-1px); filter: brightness(1.15); }
    .layer-btn:active { transform: translateY(0); }

    /* Stats bar (bottom-right, above zoom) */
    .stats-bar {
      position: absolute; bottom: 60px; right: 20px; z-index: 1000;
      display: flex; flex-direction: column; gap: 4px; align-items: flex-end;
    }
    .stat-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .stat-pill.bases-stat { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.2); }
    .stat-pill.conflict-stat { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); }

    .attr { position: absolute; bottom: 8px; right: 8px; z-index: 1000; font-size: 9px; color: rgba(148,163,184,0.35); }

    /* Popups */
    .leaflet-popup-content-wrapper {
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.95));
      border: 1px solid rgba(148, 163, 184, 0.15);
      color: #e2e8f0; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
    }
    .leaflet-popup-tip { background: rgba(15, 23, 42, 0.98); }
    .leaflet-popup-content { margin: 14px 16px; }
    .popup-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .popup-header .popup-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .popup-header .popup-dot.base-dot { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.5); }
    .popup-header .popup-dot.conflict-dot { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.5); }
    .popup-title { font-weight: 700; font-size: 14px; line-height: 1.3; color: #f1f5f9; }
    .popup-divider { height: 1px; background: rgba(148,163,184,0.12); margin: 8px 0; }
    .popup-meta { font-size: 12px; color: #94a3b8; line-height: 1.5; }
    .popup-meta strong { color: #cbd5e1; }
    .popup-tag {
      display: inline-block; margin-top: 8px; padding: 3px 8px;
      border-radius: 6px; font-size: 10px; font-weight: 600;
    }
    .popup-tag.base-tag { background: rgba(59,130,246,0.2); color: #93c5fd; }
    .popup-tag.conflict-tag { background: rgba(239,68,68,0.2); color: #fca5a5; }

    /* Flag markers */
    .flag-icon-wrap {
      width: 30px; height: 22px; border-radius: 4px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6), 0 0 0 1.5px rgba(255,255,255,0.3);
      background: #1e293b; transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .flag-icon-wrap:hover { transform: scale(1.15); box-shadow: 0 4px 16px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,255,255,0.5); }
    .flag-icon-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .flag-icon-wrap.un-flag {
      width: 30px; height: 22px;
      background: #4b69a3 url('https://upload.wikimedia.org/wikipedia/commons/2/2f/Flag_of_the_United_Nations.svg') center/cover no-repeat;
    }
    .leaflet-div-icon.flag-marker { background: none !important; border: none !important; }
    .leaflet-div-icon.conflict-marker { background: none !important; border: none !important; }

    /* Conflict icon: pulsing glow */
    .gunfire-icon {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .gunfire-icon::before {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      background: rgba(239, 68, 68, 0.2);
      animation: conflict-pulse 2s ease-in-out infinite;
    }
    @keyframes conflict-pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.5); opacity: 0; }
    }

    /* Cluster */
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background-color: rgba(59, 130, 246, 0.25) !important;
    }
    .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
      background-color: rgba(59, 130, 246, 0.7) !important; color: #fff !important;
      font-family: 'Inter', sans-serif !important; font-weight: 700 !important; font-size: 12px !important;
    }

    /* Zoom control */
    .leaflet-control-zoom { border: none !important; border-radius: 12px !important; overflow: hidden !important; box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important; }
    .leaflet-control-zoom a {
      background: rgba(15, 23, 42, 0.9) !important; color: #94a3b8 !important;
      border: none !important; width: 36px !important; height: 36px !important;
      line-height: 36px !important; font-size: 16px !important;
      transition: background 0.2s !important;
    }
    .leaflet-control-zoom a:hover { background: rgba(30, 41, 59, 0.95) !important; color: #e2e8f0 !important; }

    /* Mobile responsive */
    @media (max-width: 600px) {
      .title-bar {
        top: 10px; left: 10px; right: 10px;
        padding: 10px 14px; border-radius: 12px;
      }
      .title-bar h1 { font-size: 14px; }
      .title-bar .subtitle { font-size: 10px; margin-top: 4px; }
      .layer-toggles {
        top: auto; bottom: 70px; right: 10px; left: auto;
        flex-direction: row; gap: 5px;
      }
      .layer-btn {
        padding: 8px 10px; font-size: 11px; border-radius: 10px;
        gap: 5px;
      }
      .layer-btn .btn-icon { font-size: 12px; }
      .layer-btn .btn-count { font-size: 9px; padding: 1px 5px; }
      .stats-bar {
        bottom: 110px; right: 10px;
      }
      .stat-pill { font-size: 10px; padding: 4px 9px; }
      .leaflet-control-zoom a {
        width: 32px !important; height: 32px !important;
        line-height: 32px !important; font-size: 14px !important;
      }
      .leaflet-popup-content-wrapper { border-radius: 10px; }
      .leaflet-popup-content { margin: 10px 12px; }
      .popup-title { font-size: 13px; }
      .popup-meta { font-size: 11px; }
    }
    @media (max-width: 380px) {
      .title-bar h1 { font-size: 12px; }
      .layer-btn { padding: 6px 8px; font-size: 10px; }
      .layer-btn .btn-count { display: none; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="title-bar">
    <h1>World Military & Conflict Map</h1>
    <div class="subtitle">
      <span class="live-dot"></span>
      <span id="date-label"></span>
    </div>
  </div>

  <div class="layer-toggles">
    <button class="layer-btn military active" id="toggle-military">
      <span class="btn-icon">&#127987;&#65039;</span> Military bases
      <span class="btn-count" id="base-count">0</span>
    </button>
    <button class="layer-btn conflict" id="toggle-conflict">
      <span class="btn-icon">&#128165;</span> War & fighting
      <span class="btn-count" id="conflict-count">0</span>
    </button>
  </div>

  <div class="stats-bar">
    <div class="stat-pill bases-stat"><span id="stat-bases">0</span> bases across <span id="stat-countries">0</span> countries</div>
    <div class="stat-pill conflict-stat"><span id="stat-conflicts">0</span> active conflict zones</div>
  </div>

  <div class="attr">&copy; OpenStreetMap, CARTO</div>

  <script>
    (function () {
      'use strict';

      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var now = new Date();
      document.getElementById('date-label').textContent =
        months[now.getMonth()] + ' ' + now.getFullYear() + ' \u00B7 Click any marker for details';

      function initMap() {
        var meBounds = L.latLngBounds(L.latLng(-2, 10), L.latLng(38, 63));
        var worldBounds = L.latLngBounds(L.latLng(-85, -180), L.latLng(85, 180));
        var mapEl = document.getElementById('map');
        var initMinZoom = Math.ceil(Math.log2(Math.max(mapEl.clientWidth, mapEl.clientHeight) / 256));
        if (initMinZoom < 2) initMinZoom = 2;
        var map = L.map('map', {
          zoomControl: false,
          minZoom: initMinZoom,
          maxZoom: 18,
          maxBounds: [[-90, -200], [90, 200]],
          maxBoundsViscosity: 1,
          zoomAnimation: true,
          markerZoomAnimation: true
        });

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap, CARTO',
          noWrap: false,
          maxZoom: 19
        }).addTo(map);

        map.fitBounds(meBounds, { padding: [40, 40], animate: true });
        setTimeout(function () {
          map.invalidateSize();
          map.flyToBounds(meBounds, { padding: [40, 40], duration: 1.2 });
          var zoomForWorld = map.getBoundsZoom(worldBounds, false, L.point(0, 0));
          map.setMinZoom(Math.max(2, zoomForWorld));
        }, 100);

        var bases = [
          { coords: [32.98778, 34.59028], power: 'UK', baseName: 'RAF Akrotiri', hostCountry: 'Cyprus', detail: '~3,500 personnel | Typhoon & Tornado GR4 aircraft, Reaper drones | Signals intelligence station; weapons depot; runway 2,770m | Used for strikes on Yemen, Syria & Iraq.' },
          { coords: [33.7734, 35.0174], power: 'UK', baseName: 'Dhekelia Cantonment', hostCountry: 'Cyprus', detail: '~1,500 personnel | Ayios Nikolaos signals intelligence station | Stores: small arms, ammunition, vehicles | Garrison includes infantry and signals units.' },
          { coords: [35.1397, 33.1189], power: 'UN', baseName: 'UNIFIL HQ (Naqoura)', hostCountry: 'Lebanon', detail: '~10,000 troops from 50 countries | Armored vehicles, patrol boats, observation towers | Maritime Task Force with 6\u20138 warships | Buffer zone monitoring along Blue Line.' },
          { coords: [35.945, 35.411667], power: 'Russia', baseName: 'Hmeimim Air Base', hostCountry: 'Syria', detail: '~4,000 personnel | Su-35, Su-34, Su-24 aircraft, Ka-52 attack helicopters | S-400 & S-300 air defense systems | 49-year lease; underground ammunition bunkers; ISR drones.' },
          { coords: [35.875, 34.915], power: 'Russia', baseName: 'Tartus Naval Base', hostCountry: 'Syria', detail: '~1,700 personnel | Berths for 10 warships, submarine repair facility | Stores: naval munitions, torpedoes, cruise missiles | Russia\'s only Mediterranean naval base.' },
          { coords: [38.61778, 33.50583], power: 'US', baseName: 'Al-Tanf Garrison', hostCountry: 'Syria', detail: '~200\u2013300 US troops + ~200 SOF | MRAPs, Humvees, HIMARS (rotational) | 55 km deconfliction zone | Counter-ISIS operations at Syria\u2013Iraq\u2013Jordan tri-border.' },
          { coords: [36.6339, 35.9307], power: 'Turkey', baseName: 'Turkish bases (Idlib)', hostCountry: 'Syria', detail: '~10,000\u201315,000 Turkish troops | 60+ observation posts | M60 tanks, T-155 Firtina howitzers, armored vehicles | Drone operations (TB-2 Bayraktar); ammunition depots.' },
          { coords: [44.347222, 36.526944], power: 'US', baseName: 'Harir Air Base', hostCountry: 'Iraq', detail: '~500\u2013800 US personnel | UH-60 Black Hawks, MQ-9 Reapers | C-RAM air defense | Special operations; ISR hub for counter-ISIS.' },
          { coords: [44.4936, 33.2981], power: 'US', baseName: 'US presence Baghdad area', hostCountry: 'Iraq', detail: '~2,500 US personnel (embassy & advisors) | C-RAM Phalanx, Patriot systems | Armored vehicles, helicopters | Baghdad Diplomatic Support Center.' },
          { coords: [36.78722, 31.83417], power: 'US', baseName: 'Muwaffaq Salti Air Base (Azraq)', hostCountry: 'Jordan', detail: '~2,500\u20133,000 US personnel | F-16s, F-15Es, MQ-9 Reapers, KC-135 tankers | THAAD & Patriot missile defense | 332nd Expeditionary Wing; primary strike base.' },
          { coords: [47.575, 24.0577], power: 'US', baseName: 'Prince Sultan Air Base', hostCountry: 'Saudi Arabia', detail: '~2,500 US troops | F-22 Raptors, Patriot & THAAD systems | CAOC (Combined Air Ops Center) relocated here | Al Kharj; massive hangars and munitions storage.' },
          { coords: [48.158, 28.878], power: 'US', baseName: 'Camp Arifjan', hostCountry: 'Kuwait', detail: '~13,000 US troops | US Army Central forward HQ | Pre-positioned stocks: 1,000+ vehicles (Abrams, Bradleys, Strykers) | APS-5 warehouses; largest Army depot in region.' },
          { coords: [47.52056, 29.34667], power: 'US', baseName: 'Ali Al Salem Air Base', hostCountry: 'Kuwait', detail: '~5,000 US personnel | C-17, C-130 transports; F-16 rotations | USAF 386th AEW | Theater gateway for troops deploying to Iraq, Syria & Afghanistan.' },
          { coords: [47.68, 29.76], power: 'US', baseName: 'Camp Buehring', hostCountry: 'Kuwait', detail: '~8,000\u201314,000 US troops | Brigade staging area; Udairi Range | Pre-positioned armor & artillery | Troop acclimation before forward deployment.' },
          { coords: [51.3206, 25.1194], power: 'US', baseName: 'Al-Udeid Air Base', hostCountry: 'Qatar', detail: '~10,000 US troops | CENTCOM forward HQ; CAOC | B-52, KC-135, E-8 JSTARS, RQ-4 Global Hawk | Largest US air base in Middle East; 3,780m runway; munitions bunkers.' },
          { coords: [50.6058, 26.2058], power: 'US', baseName: 'NSA Bahrain (Fifth Fleet)', hostCountry: 'Bahrain', detail: '~7,000 US military + contractors | US Fifth Fleet HQ; ~30 warships & submarines | P-8 Poseidon patrol aircraft | Naval munitions depot; Patriot battery.' },
          { coords: [54.548, 24.248], power: 'US', baseName: 'Al Dhafra Air Base', hostCountry: 'UAE', detail: '~3,500 US personnel | F-22 Raptors, F-35s, RQ-4 Global Hawks, KC-10 tankers | THAAD missile defense battery | Runway 4,000m; advanced weapons storage.' },
          { coords: [55.0731, 24.9894], power: 'US', baseName: 'Jebel Ali (naval port)', hostCountry: 'UAE', detail: '~500 US Navy personnel rotating | Aircraft carriers & destroyers dock regularly | Pier capable of hosting supercarriers | Largest port-of-call for US Navy outside the US.' },
          { coords: [34.0, 30.27], power: 'UN', baseName: 'MFO Sinai (US part)', hostCountry: 'Egypt', detail: '~1,680 total (452 US troops) | 30+ remote observation posts | Armored vehicles, Blackhawk helicopters | Monitoring 1979 Egypt\u2013Israel peace treaty.' },
          { coords: [35.42583, 37.00194], power: 'US', baseName: 'Incirlik Air Base', hostCountry: 'Turkey', detail: '~5,000 US personnel | ~50 B-61 nuclear bombs in underground vaults | F-15E, KC-135, A-10 rotations | NATO\'s key southern hub; 3,048m runway.' },
          { coords: [51.45, 25.2], power: 'Turkey', baseName: 'Tariq Bin Ziyad base', hostCountry: 'Qatar', detail: '~3,000\u20135,000 Turkish troops | Armored vehicles, artillery, TB-2 Bayraktar drones | Turkey\'s largest Gulf base | Rapid deployment for Gulf, Red Sea & N. Africa.' },
          { coords: [43.0855, 11.3237], power: 'US', baseName: 'Camp Lemonnier', hostCountry: 'Djibouti', detail: '~4,500 US military + contractors | MQ-9 Reapers, P-3 Orions, F-15Es | Only permanent US base in Africa | Ammunition & weapons depots; CJTF-HOA HQ.' },
          { coords: [43.06082, 11.58747], power: 'China', baseName: 'PLA Support Base (Balbala)', hostCountry: 'Djibouti', detail: '~400\u20132,000 personnel (estimated) | Underground bunkers, pier for destroyers & supply ships | Armored vehicles, stores for 10,000 tons of supplies | China\'s first overseas base; helicopter pads.' },
          { coords: [43.159, 11.547], power: 'France', baseName: 'Base A\u00e9rienne 188 / Heron', hostCountry: 'Djibouti', detail: '~1,500 French troops | Mirage 2000 fighters, SA 330 Puma helicopters | Armored vehicles, naval patrol craft | France\'s largest base in Africa; controls Bab el-Mandeb.' },
          { coords: [43.09, 11.54], power: 'Japan', baseName: 'JSDF Base Djibouti', hostCountry: 'Djibouti', detail: '~180 JSDF personnel | P-3C Orion patrol aircraft (2 units) | Light vehicles and small arms | Japan\'s only overseas base; anti-piracy mission.' },
          { coords: [43.16, 11.57], power: 'Italy', baseName: 'Base Amedeo Guillet', hostCountry: 'Djibouti', detail: '~300 Italian personnel | AW101 & NH90 helicopters, Predator drones | Light armor and logistics vehicles | Supports anti-piracy & Indian Ocean operations.' },
          { coords: [20.0681, 32.1194], power: 'Russia', baseName: 'Russian / Wagner presence (east Libya)', hostCountry: 'Libya', detail: '~800\u20131,200 Africa Corps fighters | MiG-29, Su-24 aircraft at al-Jufra | Pantsir-S1 air defense, armored vehicles | Controls eastern oilfields; Mediterranean access.' },
          { coords: [13.1914, 32.8872], power: 'Russia', baseName: 'Russian / Wagner presence (Tripoli area)', hostCountry: 'Libya', detail: '~400\u2013600 Africa Corps fighters | Technical vehicles, sniper equipment, mines | Supports western Libyan factions | Supply route from Syria via sea.' },
          { coords: [45.268, 1.996], power: 'Turkey', baseName: 'Camp TURKSOM', hostCountry: 'Somalia', detail: '~200 Turkish military trainers + 1,500 capacity | Armored vehicles, small arms training facility | Turkey\'s largest overseas base (4 km\u00b2) | Trained 16,000+ Somali troops since 2017.' },
          { coords: [45.3028, 2.0082], power: 'US', baseName: 'US-backed bases (Danab)', hostCountry: 'Somalia', detail: '~500 US advisors (rotational) | MQ-9 Reaper drones; AC-130 strike support | Light weapons, comms equipment | 5 FOBs supporting Somali Danab brigade vs al-Shabaab.' },
          { coords: [44.997, 10.438], power: 'UAE', baseName: 'Berbera port & military use', hostCountry: 'Somaliland', detail: '~200\u2013300 UAE personnel | Deep-water port (400m pier); runway 4,140m | Armored vehicles, fuel & munitions storage | Forward staging for Yemen operations.' },
          // ——— AFRICA (all countries) ———
          // Kenya
          { coords: [40.9017, -1.6500], power: 'US', baseName: 'Camp Simba (Manda Bay)', hostCountry: 'Kenya', detail: '~300 US military & contractors | MQ-9 Reapers, ISR aircraft | Small arms, comms equipment, C-RAM | Counter-al-Shabaab ops; Lamu County coast.' },
          { coords: [39.6682, -4.0435], power: 'US', baseName: 'US presence Mombasa (port)', hostCountry: 'Kenya', detail: '~100\u2013200 US Navy rotating | Port for destroyer & supply ship visits | Fuel storage, repair facilities | Key Indian Ocean logistics node.' },
          { coords: [36.9284, -1.1312], power: 'UK', baseName: 'BATUK (Nanyuki)', hostCountry: 'Kenya', detail: '~280 permanent UK staff + 6 battalions/year (10,000 troops rotate) | Land Rovers, armored vehicles | Ammunition, fuel, medical stores | Permanent garrison since 1964.' },
          // Niger
          { coords: [7.9928, 16.9664], power: 'Russia', baseName: 'Air Base 201 (Agadez)', hostCountry: 'Niger', detail: '~200\u2013400 Africa Corps troops | Former US MQ-9 drone hangars ($110M facility) | Radar systems, fuel depots, armored vehicles | Russia took over 2024 after US expelled.' },

          spiderfyOnMaxZoom: true,
          showCoverageOnHover: false,
          zoomToBoundsOnClick: true
        });

          var isUn = code === 'un';
          var iconHtml = isUn

            : '<div class="flag-icon-wrap"><img src="https://flagcdn.com/w80/' + code + '.png" alt="' + b.power + '"></div>';

            icon: L.divIcon({ html: iconHtml, className: 'flag-marker', iconSize: [30, 22], iconAnchor: [15, 11] })
          });
          var detailHtml = (b.detail || '').split(' | ').map(function(line) {
            if (line.startsWith('Stores:')) return '<span style="color:#fbbf24">' + line + '</span>';
            if (/^\~?\d/.test(line)) return '<span style="color:#38bdf8">' + line + '</span>';
